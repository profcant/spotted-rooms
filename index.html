<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spotted Rooms Perugia - Trova casa e coinquilini</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <button id="toggle-sidebar" aria-label="Apri/Chiudi sidebar"><i class="fas fa-bars"></i></button>
  <h1>Spotted Rooms Perugia</h1>
  <div style="display: flex; gap: 10px;">
    <button id="theme-toggle" aria-label="Cambia tema"><i class="fas fa-moon"></i></button>
    <a id="instagram-link" href="https://instagram.com/spottedperugia" target="_blank" aria-label="Vai al profilo Instagram">
      <i class="fab fa-instagram"></i>
    </a>
  </div>
</header>

<div class="sidebar-left">
  <div class="sidebar-tabs">
    <button class="sidebar-tab active" data-tab="stanze"><i class="fas fa-home"></i> Stanze</button>
    <button class="sidebar-tab" data-tab="coinquilini"><i class="fas fa-users"></i> Coinquilini</button>
  </div>
  
  <div class="sidebar-content">
    <div id="stanze-pane" class="tab-pane active">
      <div class="filter-group">
        <label>Zona</label>
        <select id="map-zona">
          <option value="">Tutte le zone</option>
          <option value="Centro">Centro Storico</option>
          <option value="Elce">Elce / Università</option>
          <option value="San Sisto">San Sisto / Medicina</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Budget Massimo (€)</label>
        <input type="number" id="map-prezzo" placeholder="Es: 350">
      </div>
      <div class="filter-group">
        <label>Durata richiesta</label>
        <select id="map-durata">
          <option value="">Qualsiasi durata</option>
          <option value="Fino a tempo indeterminato">Fino a tempo indeterminato</option>
          <option value="1 mese">1 mese</option>
          <option value="2 mesi">2 mesi</option>
          <option value="3 mesi">3 mesi</option>
          <option value="4 mesi">4 mesi</option>
          <option value="5 mesi">5 mesi</option>
          <option value="6 mesi">6 mesi</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Tag richiesti</label>
        <div class="tag-selector" id="map-tag-filters">
          <input type="checkbox" id="map-tag1" value="No Fumatori" class="tag-checkbox">
          <label for="map-tag1" class="tag-label">🚭 No Fumatori</label>
          <input type="checkbox" id="map-tag2" value="Pet Friendly" class="tag-checkbox">
          <label for="map-tag2" class="tag-label">🐾 Pet Friendly</label>
          <input type="checkbox" id="map-tag3" value="Erasmus OK" class="tag-checkbox">
          <label for="map-tag3" class="tag-label">🌍 Erasmus OK</label>
          <input type="checkbox" id="map-tag4" value="Social" class="tag-checkbox">
          <label for="map-tag4" class="tag-label">🍷 Social</label>
          <input type="checkbox" id="map-tag5" value="Silenziosa" class="tag-checkbox">
          <label for="map-tag5" class="tag-label">📚 Silenziosa</label>
          <input type="checkbox" id="map-tag6" value="Bagno Privato" class="tag-checkbox">
          <label for="map-tag6" class="tag-label">🛁 Bagno Privato</label>
          <input type="checkbox" id="map-tag7" value="Internet Veloce" class="tag-checkbox">
          <label for="map-tag7" class="tag-label">⚡ Internet Veloce</label>
        </div>
      </div>
      <button class="apply-btn" id="apply-map-filters"><i class="fas fa-search"></i> Aggiorna Mappa</button>
      <div style="margin-top: 15px; font-size: 0.8rem;">
        Legenda prezzi: <br>
        🟢 < 300€ | 🟡 300€-350€ | 🔴 > 350€
      </div>
    </div>

    <div id="coinquilini-pane" class="tab-pane">
      <div class="filter-group">
        <label>Cerca per nome, corso o ruolo</label>
        <input type="text" id="search-profiles" placeholder="Es: Marco, Informatica, Lavoratrice">
      </div>
      <div class="filter-group">
        <label>Budget Minimo (€)</label>
        <input type="number" id="filter-p-budget-min" placeholder="Es: 250">
      </div>
      <div class="filter-group">
        <label>Durata richiesta</label>
        <select id="filter-p-durata">
          <option value="">Qualsiasi durata</option>
          <option value="Fino a tempo indeterminato">Fino a tempo indeterminato</option>
          <option value="1 mese">1 mese</option>
          <option value="2 mesi">2 mesi</option>
          <option value="3 mesi">3 mesi</option>
          <option value="4 mesi">4 mesi</option>
          <option value="5 mesi">5 mesi</option>
          <option value="6 mesi">6 mesi</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Cerca per zona</label>
        <select id="filter-p-zona">
          <option value="">Ovunque</option>
          <option value="Centro">Centro</option>
          <option value="Elce">Elce</option>
          <option value="San Sisto">San Sisto</option>
        </select>
      </div>
      <button class="apply-btn" id="apply-p-filters"><i class="fas fa-search"></i> Cerca Coinquilini</button>
      <button class="cta-button" id="open-modal-btn"><i class="fas fa-plus"></i> Crea Profilo</button>
    </div>
  </div>
</div>

<div class="main-content">
  <div id="map"></div>
  <div id="coinquilini-list-view">
    <div style="text-align: center; margin-bottom: 40px; padding: 20px; background: var(--white); border-radius: 15px; box-shadow: var(--shadow);">
      <h2 style="margin-bottom: 10px; color: var(--secondary);">Coinquilini in cerca di casa</h2>
      <p style="color: #666; font-size: 1rem; margin: 0;">
        Condividi il tuo profilo e trova coinquilini compatibili! <span class="instagram-badge">📸 Da @spottedperugia</span>
      </p>
    </div>
    <div class="profiles-grid" id="profiles-container"></div>
  </div>
</div>

<div class="modal-overlay" id="profile-modal">
  <div class="modal">
    <span class="close-btn" id="close-modal">&times;</span>
    <h2 style="margin-top: 0; color: var(--primary);">Il tuo profilo</h2>
    <form id="new-profile-form">
      <div class="form-group">
        <label for="p-nome">Nome</label>
        <input type="text" id="p-nome" placeholder="Nome" required>
      </div>

      <div class="form-group">
        <label for="p-stato">Sei studente o lavoratore?</label>
        <select id="p-stato" required>
          <option value="">Seleziona</option>
          <option value="Studente">Studente</option>
          <option value="Lavoratore">Lavoratore</option>
          <option value="Lavoratrice">Lavoratrice</option>
        </select>
      </div>

      <div class="form-group">
        <label for="p-corso">Corso di studio o professione</label>
        <input type="text" id="p-corso" placeholder="Es: Informatica, Marketing" required>
      </div>

      <div class="form-group">
        <label for="p-durata">Per quanti mesi cerchi?</label>
        <select id="p-durata" required>
          <option value="">Seleziona durata</option>
          <option value="Fino a tempo indeterminato">Fino a tempo indeterminato</option>
          <option value="1 mese">1 mese</option>
          <option value="2 mesi">2 mesi</option>
          <option value="3 mesi">3 mesi</option>
          <option value="4 mesi">4 mesi</option>
          <option value="5 mesi">5 mesi</option>
          <option value="6 mesi">6 mesi</option>
        </select>
      </div>

      <div class="form-group">
        <label for="p-bio">Breve bio (max 100 caratteri)</label>
        <textarea id="p-bio" placeholder="Raccontaci qualcosa di te..." maxlength="100" rows="3"></textarea>
      </div>

      <div class="form-group">
        <label for="p-stile">Stile di convivenza</label>
        <select id="p-stile" required>
          <option value="">Seleziona</option>
          <option value="Tranquillo">Tranquillo</option>
          <option value="Social">Social</option>
          <option value="Notturno">Notturno</option>
          <option value="Organizzato">Organizzato</option>
        </select>
      </div>

      <div class="form-group">
        <label for="p-orario">Orario preferito</label>
        <select id="p-orario" required>
          <option value="">Seleziona</option>
          <option value="Mattina">Mattina</option>
          <option value="Pomeriggio">Pomeriggio</option>
          <option value="Sera">Sera</option>
          <option value="Notte">Notte</option>
        </select>
      </div>

      <div class="form-group">
        <label for="p-animali">Accetti animali?</label>
        <select id="p-animali" required>
          <option value="">Seleziona</option>
          <option value="Sì">Sì</option>
          <option value="No">No</option>
          <option value="Solo PICCOLI">Solo piccoli animali</option>
        </select>
      </div>

      <div class="form-group">
        <label for="p-budget">Budget massimo (€)</label>
        <input type="number" id="p-budget" placeholder="Es: 350" required>
      </div>

      <div class="form-group">
        <label for="p-zona">Zona preferita</label>
        <select id="p-zona" required>
          <option value="">Seleziona zona</option>
          <option value="Centro">Centro</option>
          <option value="Elce">Elce</option>
          <option value="San Sisto">San Sisto</option>
        </select>
      </div>

      <div class="form-group">
        <label for="p-instagram">Profilo Instagram (opzionale)</label>
        <input type="text" id="p-instagram" placeholder="@tuousername">
      </div>

      <div class="form-group">
        <label for="p-whatsapp">Numero WhatsApp (opzionale)</label>
        <input type="tel" id="p-whatsapp" placeholder="+39 333 123 4567">
      </div>

      <div class="form-group">
        <label>Seleziona i tuoi tag:</label>
        <div class="tag-selector">
          <input type="checkbox" id="tag1" value="No Fumatori" class="tag-checkbox">
          <label for="tag1" class="tag-label">🚭 No Fumatori</label>
          <input type="checkbox" id="tag2" value="Pet Friendly" class="tag-checkbox">
          <label for="tag2" class="tag-label">🐾 Pet Friendly</label>
          <input type="checkbox" id="tag3" value="Erasmus OK" class="tag-checkbox">
          <label for="tag3" class="tag-label">🌍 Erasmus OK</label>
          <input type="checkbox" id="tag4" value="Social" class="tag-checkbox">
          <label for="tag4" class="tag-label">🍷 Social</label>
          <input type="checkbox" id="tag5" value="Silenziosa" class="tag-checkbox">
          <label for="tag5" class="tag-label">📚 Silenziosa</label>
          <input type="checkbox" id="tag6" value="Bagno Privato" class="tag-checkbox">
          <label for="tag6" class="tag-label">🛁 Bagno Privato</label>
        </div>
      </div>

      <button type="submit" class="apply-btn" style="margin-top: 20px;">
        <i class="fas fa-plus"></i> Pubblica Profilo
      </button>
    </form>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="main.js"></script>
</body>
</html>
